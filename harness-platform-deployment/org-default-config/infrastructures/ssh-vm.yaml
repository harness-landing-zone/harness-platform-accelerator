name: SSH VM Infrastructure
description: Traditional VM infrastructure using SSH for deployments
type: Ssh
deployment_type: Ssh
env_id: production
tags:
  type: vm
  protocol: ssh
  managed_by: platform-team

yaml:
  infrastructureDefinition:
    type: Ssh
    spec:
      credentialsRef: account.ssh_key  # Reference to SSH key secret
      hostArrayPath: <+input>  # Path to hosts in target environment
      hosts:
        - hostname: <+input>
