pipeline:
  name: Tofu Deploy
  identifier: tofu_deploy
  projectIdentifier: platform_management
  orgIdentifier: harness_platform_accelerator
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: org.platform_configs
        repoName: harness-platform-accelerator
        build: main
  variables:
    - name: tofu_action
      type: String
      description: tofu action to execute
      required: true
      value: <+input>.allowedValues(plan,apply,destroy)
    - name: gcs_bucket
      type: String
      description: GCS bucket name for tofu remote state storage
      required: true
      value: <+input>.default(harness-backend-mk)
    - name: gcp_project
      type: String
      description: GCP project ID used for OIDC token exchange and GCS backend
      required: true
      value: <+input>.default(767882366375)
    - name: gcp_pool_id
      type: String
      description: GCP Workload Identity Pool ID for OIDC authentication
      required: true
      value: <+input>.default(harness-oidc)
    - name: gcp_provider_id
      type: String
      description: GCP Workload Identity Provider ID for OIDC authentication
      required: true
      value: <+input>.default(harness-oidc)
    - name: gcp_service_account_email
      type: String
      description: GCP service account email for OIDC token exchange
      required: true
      value: <+input>.default(harness-oidc@harness-management.iam.gserviceaccount.com)
    - name: organization_name
      type: String
      description: Organization name to manage. Used for org deployments and for existing-org lookup in project-only deployments.
      required: false
      value: <+input>
    - name: project_name
      type: String
      description: Project name to deploy when scope_level is project.
      required: false
      value: <+input>
    - name: scope_level
      type: String
      description: "Deployment scope: organization (org + all discovered projects), project (single project into existing org), account (platform team only — account-level resources)."
      required: false
      value: <+input>.default(organization).allowedValues(organization,project,account)
    - name: platform_configs_repo_name
      type: String
      description: Platform configs repo to clone for org/project overrides (leave empty to use template defaults only)
      required: false
      value: <+input>
    - name: platform_configs_branch
      type: String
      description: Branch for the platform-configs repo when using the git-driven approach
      required: false
      value: <+input>.default(main)
  stages:
    - stage:
        name: tofu Plan
        identifier: tofu_plan
        description: Clone repos, resolve org, run tofu plan, upload plan to GCS
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: GitClone
                  name: Clone Platform Configs
                  identifier: clone_platform_configs_plan
                  spec:
                    connectorRef: org.platform_configs
                    repoName: <+pipeline.variables.platform_configs_repo_name>
                    build:
                      type: branch
                      spec:
                        branch: <+pipeline.variables.platform_configs_branch>
                    cloneDirectory: /harness/platform-configs/<+pipeline.variables.platform_configs_repo_name>
                  timeout: 10m
                  when:
                    stageStatus: Success
                    condition: '<+pipeline.variables.platform_configs_repo_name> != null'
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: Resolve Organization
                  identifier: resolve_org_plan
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine/git:latest
                    shell: Sh
                    command: |
                      set -e

                      ORG_NAME="<+pipeline.variables.organization_name>"

                      # If org name was provided (manual run), use it directly
                      if [ -n "$ORG_NAME" ] && [ "$ORG_NAME" != "null" ] && [ "$ORG_NAME" != "<+input>" ]; then
                        echo "Using provided organization_name: $ORG_NAME"
                      else
                        # Resolve from changed files in the config repo
                        CONFIG_DIR="/harness/platform-configs/<+pipeline.variables.platform_configs_repo_name>"
                        if [ ! -d "$CONFIG_DIR" ]; then
                          echo "ERROR: Config repo not cloned — cannot resolve organization"
                          exit 1
                        fi

                        cd "$CONFIG_DIR"

                        BRANCH="<+pipeline.variables.platform_configs_branch>"
                        if [ "$BRANCH" = "main" ]; then
                          CHANGED=$(git diff HEAD~1 --name-only 2>/dev/null || git diff --name-only)
                        else
                          git fetch origin main --quiet 2>/dev/null || true
                          CHANGED=$(git diff origin/main...HEAD --name-only 2>/dev/null || git diff --name-only)
                        fi

                        ORGS=$(echo "$CHANGED" | grep '^organizations/' | cut -d'/' -f2 | sort -u)
                        ORG_COUNT=$(echo "$ORGS" | grep -c . || true)

                        if [ "$ORG_COUNT" -gt 1 ]; then
                          echo "ERROR: Multiple organizations changed — one org per push required."
                          echo "Changed orgs:"
                          echo "$ORGS"
                          exit 1
                        elif [ "$ORG_COUNT" -eq 0 ]; then
                          echo "ERROR: No organization changes found under organizations/"
                          exit 1
                        fi

                        ORG_NAME=$(echo "$ORGS" | head -1)
                        echo "Resolved organization from changed files: $ORG_NAME"
                      fi

                      export RESOLVED_ORG_NAME="$ORG_NAME"
                    outputVariables:
                      - name: RESOLVED_ORG_NAME
                  timeout: 5m
                  when:
                    stageStatus: Success
                    condition: '<+pipeline.variables.platform_configs_repo_name> != null'
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Plugin
                  name: GCP OIDC Token
                  identifier: gcp_oidc_token_plan
                  spec:
                    connectorRef: account.harnessImage
                    image: plugins/gcp-oidc
                    settings:
                      project_id: <+pipeline.variables.gcp_project>
                      pool_id: <+pipeline.variables.gcp_pool_id>
                      provider_id: <+pipeline.variables.gcp_provider_id>
                      service_account_email_id: <+pipeline.variables.gcp_service_account_email>
                      duration: 3600
                      create_application_credentials_file: false
                  timeout: 5m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: tofu Init
                  identifier: tofu_init_plan
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/opentofu/opentofu:latest
                    shell: Sh
                    command: |
                      set -e
                      cd /harness/harness-platform-deployment

                      # Use resolved org if available, otherwise fall back to pipeline variable
                      if [ -n "$RESOLVED_ORG" ] && [ "$RESOLVED_ORG" != "null" ]; then
                        ORG_NAME="$RESOLVED_ORG"
                      else
                        ORG_NAME="<+pipeline.variables.organization_name>"
                      fi

                      ORG_STATE_KEY=$(printf '%s' "$ORG_NAME" | tr ' -' '_')
                      PROJECT_STATE_KEY=$(printf '%s' "<+pipeline.variables.project_name>" | tr ' -' '_')

                      if [ "<+pipeline.variables.scope_level>" = "account" ]; then
                        STATE_PREFIX="harness/account/platform-setup"
                      elif [ "<+pipeline.variables.scope_level>" = "project" ]; then
                        STATE_PREFIX="harness/orgs/${ORG_STATE_KEY}/projects/${PROJECT_STATE_KEY}"
                      else
                        STATE_PREFIX="harness/orgs/${ORG_STATE_KEY}"
                      fi

                      export STATE_PREFIX
                      export EFFECTIVE_ORG_NAME="$ORG_NAME"

                      tofu init \
                        -backend-config="bucket=<+pipeline.variables.gcs_bucket>" \
                        -backend-config="prefix=${STATE_PREFIX}"
                    envVariables:
                      GOOGLE_OAUTH_ACCESS_TOKEN: <+steps.gcp_oidc_token_plan.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                      TF_VAR_harness_platform_account: <+account.identifier>
                      TF_VAR_organization_name: <+pipeline.variables.organization_name>
                      TF_VAR_project_name: <+pipeline.variables.project_name>
                      TF_VAR_scope_level: <+pipeline.variables.scope_level>
                      RESOLVED_ORG: <+steps.resolve_org_plan.output.outputVariables.RESOLVED_ORG_NAME>
                    outputVariables:
                      - name: STATE_PREFIX
                      - name: EFFECTIVE_ORG_NAME
                  timeout: 15m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: tofu Plan
                  identifier: tofu_plan_step
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/opentofu/opentofu:latest
                    shell: Sh
                    command: |
                      set -e
                      cd /harness/harness-platform-deployment

                      if [ -d "/harness/platform-configs/<+pipeline.variables.platform_configs_repo_name>" ]; then
                        export TF_VAR_configs_relative_path="../platform-configs/<+pipeline.variables.platform_configs_repo_name>"
                      fi

                      if [ "<+pipeline.variables.tofu_action>" = "destroy" ]; then
                        tofu plan -destroy -out=tfplan
                      else
                        tofu plan -out=tfplan
                      fi
                    envVariables:
                      HARNESS_PLATFORM_API_KEY: <+secrets.getValue("harness_bootstrap_api_key")>
                      HARNESS_ACCOUNT_ID: <+account.identifier>
                      GOOGLE_OAUTH_ACCESS_TOKEN: <+steps.gcp_oidc_token_plan.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                      TF_VAR_harness_platform_account: <+account.identifier>
                      TF_VAR_organization_name: <+steps.tofu_init_plan.output.outputVariables.EFFECTIVE_ORG_NAME>
                      TF_VAR_project_name: <+pipeline.variables.project_name>
                      TF_VAR_scope_level: <+pipeline.variables.scope_level>
                  timeout: 30m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: Upload Plan to GCS
                  identifier: upload_plan
                  spec:
                    connectorRef: account.harnessImage
                    image: google/cloud-sdk:slim
                    shell: Sh
                    command: |
                      set -e

                      PLAN_FILE="/harness/harness-platform-deployment/tfplan"
                      if [ ! -f "$PLAN_FILE" ]; then
                        echo "ERROR: Plan file not found at $PLAN_FILE"
                        exit 1
                      fi

                      GCS_BUCKET="<+pipeline.variables.gcs_bucket>"
                      STATE_PREFIX="$STATE_PREFIX"
                      EXECUTION_ID="<+pipeline.executionId>"
                      PLAN_OBJECT="${STATE_PREFIX}/plans/${EXECUTION_ID}.tfplan"

                      echo "Uploading plan to gs://${GCS_BUCKET}/${PLAN_OBJECT}"

                      # Upload via GCS JSON API using OIDC Bearer token
                      ENCODED_OBJECT=$(printf '%s' "$PLAN_OBJECT" | sed 's|/|%2F|g')

                      HTTP_CODE=$(curl -sf -o /dev/null -w '%{http_code}' \
                        -X POST \
                        -H "Authorization: Bearer $GCLOUD_ACCESS_TOKEN" \
                        -H "Content-Type: application/octet-stream" \
                        --data-binary @"$PLAN_FILE" \
                        "https://storage.googleapis.com/upload/storage/v1/b/${GCS_BUCKET}/o?uploadType=media&name=${PLAN_OBJECT}")

                      if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                        echo "Plan uploaded successfully (HTTP ${HTTP_CODE})"
                      else
                        echo "ERROR: Upload failed with HTTP ${HTTP_CODE}"
                        exit 1
                      fi

                      export PLAN_GCS_PATH="gs://${GCS_BUCKET}/${PLAN_OBJECT}"
                    envVariables:
                      GCLOUD_ACCESS_TOKEN: <+steps.gcp_oidc_token_plan.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                      STATE_PREFIX: <+steps.tofu_init_plan.output.outputVariables.STATE_PREFIX>
                    outputVariables:
                      - name: PLAN_GCS_PATH
                  timeout: 10m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - stage:
        name: Approval
        identifier: approval_gate
        description: Manual approval required before tofu apply or destroy
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approve tofu Apply
                  identifier: approve_tofu_apply
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      Please review the tofu plan before proceeding.

                        Action       : <+pipeline.variables.tofu_action>
                        Scope        : <+pipeline.variables.scope_level>
                        Organization : <+stages.tofu_plan.spec.execution.steps.tofu_init_plan.output.outputVariables.EFFECTIVE_ORG_NAME>
                        Project      : <+pipeline.variables.project_name>
                        Plan artifact: <+stages.tofu_plan.spec.execution.steps.upload_plan.output.outputVariables.PLAN_GCS_PATH>

                      Review the plan output in Stage 1 (tofu Plan) and approve only
                      if the changes are expected and safe to apply.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                        - account._account_all_users
                        - org._organization_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
        when:
          pipelineStatus: Success
          condition: '<+pipeline.variables.tofu_action> != "plan"'
    - stage:
        name: tofu Apply
        identifier: tofu_apply
        description: Download reviewed plan from GCS and apply
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: GitClone
                  name: Clone Platform Configs
                  identifier: clone_platform_configs_apply
                  spec:
                    connectorRef: org.platform_configs
                    repoName: <+pipeline.variables.platform_configs_repo_name>
                    build:
                      type: branch
                      spec:
                        branch: <+pipeline.variables.platform_configs_branch>
                    cloneDirectory: /harness/platform-configs/<+pipeline.variables.platform_configs_repo_name>
                  timeout: 10m
                  when:
                    stageStatus: Success
                    condition: '<+pipeline.variables.platform_configs_repo_name> != null && <+pipeline.variables.platform_configs_repo_name> != ""'
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Plugin
                  name: GCP OIDC Token
                  identifier: gcp_oidc_token_apply
                  spec:
                    connectorRef: account.harnessImage
                    image: plugins/gcp-oidc
                    settings:
                      project_id: <+pipeline.variables.gcp_project>
                      pool_id: <+pipeline.variables.gcp_pool_id>
                      provider_id: <+pipeline.variables.gcp_provider_id>
                      service_account_email_id: <+pipeline.variables.gcp_service_account_email>
                      duration: 3600
                      create_application_credentials_file: false
                  timeout: 5m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: tofu Init
                  identifier: tofu_init_apply
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/opentofu/opentofu:latest
                    shell: Sh
                    command: |
                      set -e
                      cd /harness/harness-platform-deployment

                      # Re-derive org name from the plan stage output
                      ORG_NAME="$EFFECTIVE_ORG_NAME"
                      ORG_STATE_KEY=$(printf '%s' "$ORG_NAME" | tr ' -' '_')
                      PROJECT_STATE_KEY=$(printf '%s' "<+pipeline.variables.project_name>" | tr ' -' '_')

                      if [ "<+pipeline.variables.scope_level>" = "account" ]; then
                        STATE_PREFIX="harness/account/platform-setup"
                      elif [ "<+pipeline.variables.scope_level>" = "project" ]; then
                        STATE_PREFIX="harness/orgs/${ORG_STATE_KEY}/projects/${PROJECT_STATE_KEY}"
                      else
                        STATE_PREFIX="harness/orgs/${ORG_STATE_KEY}"
                      fi

                      export STATE_PREFIX

                      tofu init \
                        -backend-config="bucket=<+pipeline.variables.gcs_bucket>" \
                        -backend-config="prefix=${STATE_PREFIX}"
                    envVariables:
                      GOOGLE_OAUTH_ACCESS_TOKEN: <+steps.gcp_oidc_token_apply.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                      TF_VAR_harness_platform_account: <+account.identifier>
                      TF_VAR_organization_name: <+stages.tofu_plan.spec.execution.steps.tofu_init_plan.output.outputVariables.EFFECTIVE_ORG_NAME>
                      TF_VAR_project_name: <+pipeline.variables.project_name>
                      TF_VAR_scope_level: <+pipeline.variables.scope_level>
                      EFFECTIVE_ORG_NAME: <+stages.tofu_plan.spec.execution.steps.tofu_init_plan.output.outputVariables.EFFECTIVE_ORG_NAME>
                    outputVariables:
                      - name: STATE_PREFIX
                  timeout: 15m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: Download Plan from GCS
                  identifier: download_plan
                  spec:
                    connectorRef: account.harnessImage
                    image: google/cloud-sdk:slim
                    shell: Sh
                    command: |
                      set -e

                      GCS_BUCKET="<+pipeline.variables.gcs_bucket>"
                      STATE_PREFIX="$STATE_PREFIX"
                      EXECUTION_ID="<+pipeline.executionId>"
                      PLAN_OBJECT="${STATE_PREFIX}/plans/${EXECUTION_ID}.tfplan"
                      PLAN_FILE="/harness/harness-platform-deployment/tfplan"

                      echo "Downloading plan from gs://${GCS_BUCKET}/${PLAN_OBJECT}"

                      ENCODED_OBJECT=$(printf '%s' "$PLAN_OBJECT" | sed 's|/|%2F|g')

                      curl -sf \
                        -H "Authorization: Bearer $GCLOUD_ACCESS_TOKEN" \
                        -o "$PLAN_FILE" \
                        "https://storage.googleapis.com/storage/v1/b/${GCS_BUCKET}/o/${ENCODED_OBJECT}?alt=media"

                      if [ ! -s "$PLAN_FILE" ]; then
                        echo "ERROR: Downloaded plan file is empty"
                        exit 1
                      fi

                      echo "Plan downloaded successfully ($(wc -c < "$PLAN_FILE") bytes)"
                    envVariables:
                      GCLOUD_ACCESS_TOKEN: <+steps.gcp_oidc_token_apply.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                      STATE_PREFIX: <+steps.tofu_init_apply.output.outputVariables.STATE_PREFIX>
                  timeout: 10m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: Run
                  name: tofu Apply
                  identifier: tofu_apply_step
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/opentofu/opentofu:latest
                    shell: Sh
                    command: |
                      set -e
                      cd /harness/harness-platform-deployment

                      if [ -d "/harness/platform-configs/<+pipeline.variables.platform_configs_repo_name>" ]; then
                        export TF_VAR_configs_relative_path="../platform-configs/<+pipeline.variables.platform_configs_repo_name>"
                      fi

                      # Apply the exact plan that was reviewed
                      tofu apply -auto-approve tfplan
                    envVariables:
                      HARNESS_PLATFORM_API_KEY: <+secrets.getValue("harness_bootstrap_api_key")>
                      HARNESS_ACCOUNT_ID: <+account.identifier>
                      GOOGLE_OAUTH_ACCESS_TOKEN: <+steps.gcp_oidc_token_apply.output.outputVariables.GCLOUD_ACCESS_TOKEN>
                      TF_VAR_harness_platform_account: <+account.identifier>
                      TF_VAR_organization_name: <+stages.tofu_plan.spec.execution.steps.tofu_init_plan.output.outputVariables.EFFECTIVE_ORG_NAME>
                      TF_VAR_project_name: <+pipeline.variables.project_name>
                      TF_VAR_scope_level: <+pipeline.variables.scope_level>
                  timeout: 60m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
        when:
          pipelineStatus: Success
          condition: '<+pipeline.variables.tofu_action> != "plan"'
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
