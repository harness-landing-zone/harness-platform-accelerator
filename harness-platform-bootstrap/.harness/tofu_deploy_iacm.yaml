pipeline:
  name: Tofu Deploy IACM
  identifier: tofu_deploy_iacm
  projectIdentifier: platform_management
  orgIdentifier: harness_platform_accelerator
  description: Landing Zone deployment pipeline using Harness IACM.
  tags:
    engine: iacm
    managed_by: landing_zone
  properties:
    ci:
      codebase:
        connectorRef: org.platform_configs
        repoName: harness-platform-accelerator
        build: <+input>
  variables:
    - name: tofu_action
      type: String
      description: "Action: plan (read-only), apply (provision), destroy (tear down)"
      required: true
      value: <+input>.allowedValues(plan,apply,destroy)
    - name: organization_name
      type: String
      description: Organization name to manage
      required: false
      value: <+input>.default()
    - name: project_name
      type: String
      description: Project name (only when scope_level = project)
      required: false
      value: <+input>.default()
    - name: scope_level
      type: String
      description: "Deployment scope: organization, project, or account"
      required: false
      value: <+input>.default(organization).allowedValues(organization,project,account)
    - name: platform_configs_repo_name
      type: String
      description: Platform configs repo for org/project overrides (leave empty for defaults only)
      required: false
      value: <+input>.default()
    - name: platform_configs_branch
      type: String
      description: Branch for the platform-configs repo
      required: false
      value: <+input>.default(main)
    - name: configs_relative_path
      type: String
      description: Relative path to configs within the codebase repo (same-repo alternative)
      required: false
      value: <+input>.default(../platform-configs)
    - name: harness_platform_endpoint
      type: String
      description: Harness Platform API endpoint
      required: false
      value: <+input>.default(https://app.harness.io/gateway)
    - name: skip_workspace_setup
      type: String
      description: Set to true when triggered from an existing workspace — skips Stages 1-3
      required: false
      value: <+input>.default(false).allowedValues(true,false)
    - name: workspace_api_key_referance
      type: String
      description: The Secret Key created from the service account to be used in the workspace pipeline
      required: false
      value: <+input>.default(harness_platform_accelerator_platform_deployer_token)
    - name: workspace_repository
      type: String
      description: Repo the workspace will clone. Defaults to this pipeline's codebase repo.
      required: false
      value: <+input>.default(<+pipeline.properties.ci.codebase.repoName>)
    - name: workspace_repository_branch
      type: String
      description: Repo the workspace will clone. Defaults to this pipeline's codebase repo.
      required: false
      value: <+input>.default(<+pipeline.properties.ci.codebase.build.spec.branch>)
  stages:
    - stage:
        name: Find Workspace
        identifier: find_workspace
        description: Look up whether the target IACM workspace already exists
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Lookup Workspace
                  identifier: lookup_workspace
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/opentofu/opentofu:latest
                    shell: Sh
                    command: |
                      set -e
                      cd /harness/workspace-creation

                      tofu init -backend=false

                      tofu apply -refresh-only -auto-approve -state=/tmp/ws.tfstate

                      WORKSPACE_ID=$(tofu output -state=/tmp/ws.tfstate -raw workspace_identifier)
                      WORKSPACE_EXISTS=$(tofu output -state=/tmp/ws.tfstate -raw workspace_exists)
                      WORKSPACE_IMPORT_ID=$(tofu output -state=/tmp/ws.tfstate -raw workspace_import_id)

                      echo "Workspace: ${WORKSPACE_ID}"
                      echo "Exists: ${WORKSPACE_EXISTS}"

                      export WORKSPACE_ID
                      export WORKSPACE_EXISTS
                      export WORKSPACE_IMPORT_ID
                    envVariables:
                      HARNESS_PLATFORM_API_KEY: <+secrets.getValue(<+pipeline.variables.workspace_api_key_referance>)>
                      HARNESS_ACCOUNT_ID: <+account.identifier>
                      HARNESS_ENDPOINT: <+pipeline.variables.harness_platform_endpoint>
                      TF_VAR_harness_platform_account: <+account.identifier>
                      TF_VAR_harness_platform_url: <+pipeline.variables.harness_platform_endpoint>
                      TF_VAR_organization_name: <+pipeline.variables.organization_name>
                      TF_VAR_project_name: <+pipeline.variables.project_name>
                      TF_VAR_scope_level: <+pipeline.variables.scope_level>
                      TF_VAR_configs_relative_path: <+pipeline.variables.configs_relative_path>
                      TF_VAR_workspace_org_id: <+org.identifier>
                      TF_VAR_workspace_project_id: <+project.identifier>
                      TF_VAR_workspace_repository: <+pipeline.variables.workspace_repository>
                      TF_VAR_workspace_repository_branch: <+pipeline.variables.workspace_repository_branch>
                      TF_VAR_workspace_api_key_secret_ref: <+pipeline.variables.workspace_api_key_referance>
                      TF_VAR_platform_configs_repo_name: <+pipeline.variables.platform_configs_repo_name>
                    outputVariables:
                      - name: WORKSPACE_ID
                      - name: WORKSPACE_EXISTS
                      - name: WORKSPACE_IMPORT_ID
                  timeout: 5m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.skip_workspace_setup> != "true"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - stage:
        name: Approve Workspace Creation
        identifier: approve_workspace
        description: Approval required before creating a new IACM workspace
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approve New Workspace
                  identifier: approve_new_workspace
                  type: HarnessApproval
                  timeout: 1d
                  spec:
                    approvalMessage: |-
                      A new IACM workspace needs to be created.

                        Workspace ID : <+stages.find_workspace.spec.execution.steps.lookup_workspace.output.outputVariables.WORKSPACE_ID>
                        Scope        : <+pipeline.variables.scope_level>
                        Organization : <+pipeline.variables.organization_name>
                        Project      : <+pipeline.variables.project_name>

                      Approve to create the workspace and proceed with provisioning.
                      Reject to abort the pipeline.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - _project_all_users
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.skip_workspace_setup> != "true" && <+stages.find_workspace.spec.execution.steps.lookup_workspace.output.outputVariables.WORKSPACE_EXISTS> == "false"
    - stage:
        name: Converge Workspace
        identifier: converge_workspace
        description: Import existing or create new workspace, then apply config
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Import or Create Workspace
                  identifier: converge_workspace_step
                  spec:
                    connectorRef: account.harnessImage
                    image: ghcr.io/opentofu/opentofu:latest
                    shell: Sh
                    command: |
                      set -e
                      cd /harness/workspace-creation

                      tofu init -backend=false

                      # If workspace already exists, import it so tofu can
                      # update variables/config instead of trying to create
                      # a duplicate (which would 409).
                      if [ "$WORKSPACE_EXISTS" = "true" ]; then
                        echo "Importing existing workspace: ${WORKSPACE_IMPORT_ID}"
                        tofu import \
                          -state=/tmp/ws.tfstate \
                          module.hpa_workspace.harness_platform_workspace.workspace \
                          "$WORKSPACE_IMPORT_ID" || true
                      fi

                      tofu apply -auto-approve -state=/tmp/ws.tfstate
                    envVariables:
                      HARNESS_PLATFORM_API_KEY: <+secrets.getValue(<+pipeline.variables.workspace_api_key_referance>)>
                      HARNESS_ACCOUNT_ID: <+account.identifier>
                      HARNESS_ENDPOINT: <+pipeline.variables.harness_platform_endpoint>
                      TF_VAR_harness_platform_account: <+account.identifier>
                      TF_VAR_harness_platform_url: <+pipeline.variables.harness_platform_endpoint>
                      TF_VAR_organization_name: <+pipeline.variables.organization_name>
                      TF_VAR_project_name: <+pipeline.variables.project_name>
                      TF_VAR_scope_level: <+pipeline.variables.scope_level>
                      TF_VAR_configs_relative_path: <+pipeline.variables.configs_relative_path>
                      TF_VAR_workspace_org_id: <+org.identifier>
                      TF_VAR_workspace_project_id: <+project.identifier>
                      TF_VAR_workspace_api_key_secret_ref: <+pipeline.variables.workspace_api_key_referance>
                      TF_VAR_workspace_repository: <+pipeline.variables.workspace_repository>
                      TF_VAR_workspace_repository_branch: <+pipeline.variables.workspace_repository_branch>
                      TF_VAR_platform_configs_repo_name: <+pipeline.variables.platform_configs_repo_name>
                      WORKSPACE_EXISTS: <+stages.find_workspace.spec.execution.steps.lookup_workspace.output.outputVariables.WORKSPACE_EXISTS>
                      WORKSPACE_IMPORT_ID: <+stages.find_workspace.spec.execution.steps.lookup_workspace.output.outputVariables.WORKSPACE_IMPORT_ID>
                  timeout: 10m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.skip_workspace_setup> != "true"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
    - stage:
        name: Tofu Provision
        identifier: tofu_provision
        description: Init, plan, approve, and apply/destroy via IACM
        type: IACM
        spec:
          workspace: <+input>.default(<+stages.find_workspace.spec.execution.steps.lookup_workspace.output.outputVariables.WORKSPACE_ID>)
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: GitClone
                  name: Clone Platform Configs
                  identifier: clone_platform_configs
                  spec:
                    connectorRef: org.platform_configs
                    repoName: <+pipeline.variables.platform_configs_repo_name>
                    build:
                      type: branch
                      spec:
                        branch: <+pipeline.variables.platform_configs_branch>
                    cloneDirectory: /harness/platform-configs/<+pipeline.variables.platform_configs_repo_name>
                  timeout: 10m
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.platform_configs_repo_name> != null && <+pipeline.variables.platform_configs_repo_name> != ""
                  failureStrategies:
                    - onFailure:
                        errors:
                          - AllErrors
                        action:
                          type: Abort
              - step:
                  type: IACMOpenTofuPlugin
                  name: Init
                  identifier: init
                  timeout: 10m
                  spec:
                    command: init
              - step:
                  type: IACMOpenTofuPlugin
                  name: Plan
                  identifier: plan
                  timeout: 30m
                  spec:
                    command: plan
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.tofu_action> != "destroy"
              - step:
                  type: IACMOpenTofuPlugin
                  name: Plan Destroy
                  identifier: plan_destroy
                  timeout: 30m
                  spec:
                    command: plan-destroy
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.tofu_action> == "destroy"
              - step:
                  type: IACMApproval
                  name: Approve Changes
                  identifier: approve_changes
                  timeout: 1d
                  spec:
                    autoApprove: false
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.tofu_action> != "plan"
              - step:
                  type: IACMOpenTofuPlugin
                  name: Apply
                  identifier: apply
                  timeout: 60m
                  spec:
                    command: apply
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.tofu_action> == "apply"
              - step:
                  type: IACMOpenTofuPlugin
                  name: Destroy
                  identifier: destroy
                  timeout: 60m
                  spec:
                    command: destroy
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.tofu_action> == "destroy"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
